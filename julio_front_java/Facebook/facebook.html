<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Mi Facebook</title>
</head>
<body>
    <div class="row g-0 bg-body-secondary position-relative">
        <div class="col-md-6 mb-md-0 p-md-4 text-center">
            <img src="C:\Users\SNPP\Downloads\Captura de pantalla_11-5-2026_152348_www.facebook.com.jpeg" 
                 class="img-fluid mb-3" 
                 alt="Logo de facebook" 
                 style="max-width:400px;">
        </div>

        <!-- Barra divisoria -->
        <div class="col-md-1 d-flex justify-content-center">
            <div class="vr"></div>
        </div>

        <div class="col-md-5 p-4 ps-md-0">
            <!--Formulario de inicio de sesión -->
            <h5 class="mt-0">Iniciar Sesión</h5>
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                <label for="floatingInput">Correo Electrónico</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                <label for="floatingPassword">Contraseña</label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="checkDefault">
                <label class="form-check-label" for="checkDefault">Recordarme</label>
            </div>

            <button type="button" class="btn btn-outline-primary w-100">Acceder</button>

            <!-- Apartados adicionales -->
            <div class="mt-3">
                <a href="olvidaste.html" class="d-block mb-2">¿Olvidaste tu contraseña?</a>
            </div>
            <div class="text-center mt-3">
                <a href="crear.html" class="btn btn-primary">Crear una cuenta</a>
            </div>
        </div>
    </div> 

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
