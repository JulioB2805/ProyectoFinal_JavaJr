<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Crear Cuenta</title>
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card mx-auto shadow" style="max-width: 500px;">
  <div class="card-header text-center bg-primary text-white">
    Crear una cuenta
  </div>

  <form class="p-4 needs-validation" novalidate>
    <div class="mb-3">
      <input type="text" class="form-control" id="nombre" placeholder="Nombre" required>
    </div>

    <div class="mb-3">
      <input type="text" class="form-control" id="apellido" placeholder="Apellido" required>
    </div>

    <div class="mb-3 input-group">
      <span class="input-group-text">@</span>
      <input type="text" class="form-control" id="usuario" placeholder="Nombre de usuario" required>
      <div class="invalid-feedback">Por favor elige un nombre de usuario.</div>
    </div>

    <div class="mb-3">
      <select class="form-select" id="estado" required>
         <option selected disabled value="">Departamento</option>
            <option>Capital</option>
            <option>Alto Paraná</option>
            <option>Boquerón</option>
            <option>Caaguazú</option>
            <option>Caazapá</option>
            <option>Central</option>
            <option>Concepción</option>
            <option>Cordillera</option>
            <option>Guairá</option>
            <option>Itapúa</option>
            <option>Misiones</option>
            <option>Paraguarí</option>
            <option>Presidente Hayes</option>
            <option>San Pedro</option>
            <option>Canindeyú</option>
            <option>Amambay</option>
            <option>Ñeembucú</option>
      </select>
    </div>

     <div class="mb-3">
      <input type="text" class="form-control" id="ciudad" placeholder="Ciudad" required>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="terminos" required>
      <label class="form-check-label" for="terminos">
        Acepto los términos y condiciones
      </label>
      <div class="invalid-feedback">Debes aceptar antes de enviar.</div>
    </div>


    <div class="text-center mt-3">
        <a href="facebook.html" class="btn btn-primary">Registrarte</a>
    </div>

  </form>

  <div class="card-footer text-center text-muted">
    Tus datos están protegidos
  </div>
</div>

























    <script src="https://cdn.jsdelivr.net/npm/bootstrap"></script>
</body>
</html>
