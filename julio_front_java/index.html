<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Java Junior</title>


  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- Fondo de pantalla -->
<body style="background-image: url('https://images.alphacoders.com/688/thumb-1920-688200.jpg');
             background-size: cover;
             background-position: center;
             background-repeat: no-repeat;">

  <div class="container text-center mt-5">


    <!-- Imagen principal -->
    <img src="https://upload.wikimedia.org/wikipedia/en/3/30/Java_programming_language_logo.svg" 
         alt="Logo de Java" 
         class="img-fluid mb-3" 
         style="max-width:200px;">

    <!-- Título -->
    <h1 style="color: white;">Curso de Programación Java</h1>

    <!-- Botón que abre el modal -->
    <button type="button" class="btn btn-primary mt-3" data-bs-toggle="modal" data-bs-target="#miModal">
      Acceder al curso
    </button>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="miModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Bienvenidos al curso de Java Junior</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <!-- Formulario de inicio de sesión -->
          <h6 class="text-center mb-3">Iniciar Sesión</h6>
          <form onsubmit="return validarLogin()">
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre de usuario</label>
              <input type="text" class="form-control" id="nombre" placeholder="Tu nombre" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <input type="password" class="form-control" id="password" placeholder="********" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Ingresar</button>
          </form>
|
          <hr class="my-4">

          <!-- Enlaces -->
          <div class="text-center">
            <p>Más información:</p>
            <a href="https://es.wikipedia.org/wiki/Java" target="_blank" class="btn btn-success mb-2">
              Ir a Wikipedia
            </a>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Volver
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script de validación -->
  <script>
    function validarLogin() {
      const password = document.getElementById("password").value;
      if (password === "12345") {
        alert("Inicio de sesión exitoso. ¡Bienvenido!");
      } else {
        alert("Contraseña incorrecta. Intenta de nuevo.");
        return false;
      }
    }
  </script>
</body>
</html>
