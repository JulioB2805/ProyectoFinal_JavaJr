<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <title>Formulario Tailwind</title>
</head>
<body style="background-image: url('https://img.magnific.com/premium-vector/abstract-geometric-line-neon-background_93536-342.jpg');
             background-size: cover;
             background-position: center;
             background-repeat: no-repeat;
             min-height: 100vh;">

<body class="bg-gray-100 p-10">

  <form class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-md">

    <div class="space-y-12">

      <!-- Registros-->
      <div class="border-b border-gray-300 pb-12">
        <h2 class="text-base font-semibold leading-7 text-gray-900">
          Registro de Productos
        </h2>
        <p class="mt-1 text-sm leading-6 text-gray-600">
          Registre su producto con los datos requeridos.
        </p>

        <!-- Foto del producto -->
        <div class="col-span-full">
          <label class="block text-sm font-medium text-gray-900">
            Imagen del Producto
          </label>

          <div class="mt-2 flex justify-center rounded-lg border border-dashed border-gray-400 px-6 py-10">
            <div class="text-center">
              <div class="mx-auto w-12 h-12 rounded bg-gray-300"></div>

              <div class="mt-4 flex text-sm text-gray-600 justify-center">
                <label
                  for="file-upload"
                  class="cursor-pointer font-semibold text-indigo-600 hover:text-indigo-500"
                >
                  Subir un archivo
                </label>
                <input id="file-upload" name="file-upload" type="file" class="hidden" />
                <p class="pl-1"> o arrastrar y soltar</p>
              </div>

              <p class="text-xs text-gray-600">
                PNG o JPG hasta 10MB
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- Información del producto -->
      <div class="border-b border-gray-300 pb-12">
        <h2 class="text-base font-semibold leading-7 text-gray-900">
          Información del producto
        </h2>

        <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">

          <!-- Nombre -->
          <div class="sm:col-span-3">
            <label class="block text-sm font-medium text-gray-900">Nombre</label>
            <div class="mt-2">
              <input type="text" class="block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-indigo-600 focus:outline-none" />
            </div>
          </div>

          <!-- Precio -->
          <div class="sm:col-span-3">
            <label class="block text-sm font-medium text-gray-900">Precio</label>
            <div class="mt-2">
              <input type="text" class="block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-indigo-600 focus:outline-none" />
            </div>
          </div>

          <!-- Fecha de ingreso -->
          <div class="sm:col-span-3">
            <label class="block text-sm font-medium text-gray-900">Fecha de ingreso</label>
            <div class="mt-2">
              <input type="date" class="block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-indigo-600 focus:ring-indigo-600 focus:outline-none" />
            </div>
          </div>

          <!-- Categoría general -->
          <div class="sm:col-span-3">
            <label class="block text-sm font-medium text-gray-900">Categoría</label>
            <div class="mt-2">
              <select class="block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-indigo-600 focus:outline-none">
                <option>Hogar</option>
                <option>Cuidado personal y salud</option>
                <option>Mascotas</option>
                <option>Productos de limpieza</option>
                <option>Alimentos</option>
                <option>Bebidas</option>
              </select>
            </div>
          </div>

          <!-- Cantidad + Categoría de la Cantidad -->
          <div class="sm:col-span-3">
            <label class="block text-sm font-medium text-gray-900">Cantidad</label>
            <div class="mt-2">
              <input type="text" class="block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-indigo-600 focus:outline-none" />
            </div>

            <label class="block text-sm font-medium text-gray-900 mt-4">Categoría de la Cantidad</label>
            <div class="mt-2">
              <select class="block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-indigo-600 focus:outline-none">
                <option>Litros</option>
                <option>Unidades</option>
                <option>Cajas</option>
              </select>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Botones -->
    <div class="mt-6 flex items-center justify-end gap-x-6">
        <div>
          <a href="cliente.html" button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500">Atrás</a>
        </div>
      <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500">Guardar</button>
    </div>

  </form>

</body>
</html>
